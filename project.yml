name: VideoCaption
options:
  bundleIdPrefix: com.example.videocaption
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
targets:
  VideoCaption:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    info:
      path: Supporting/Info.plist
      properties:
        CFBundleDisplayName: Caption
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSSpeechRecognitionUsageDescription: "動画から字幕を生成するために音声認識を使用します。"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: com.example.videocaption.app
  VideoCaptionTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: VideoCaption
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.videocaption.tests
schemes:
  VideoCaption:
    build:
      targets:
        VideoCaption: all
        VideoCaptionTests: [test]
    test:
      targets:
        - VideoCaptionTests
