[tools]
node = ["22", "24"]
uv = "latest"
python = "3.14"
pnpm = "10"
jj = "latest"
process-compose = "latest"
stripe-cli = "latest"
opentofu = "latest"
flyctl = "latest"
direnv = "latest"
# infra/secrets を age で暗号化するための SOPS/age。
# age は公開鍵暗号で、秘密鍵 ~/.config/sops/age/keys.txt を root of trust とする。
# sops は YAML/env ファイルを in-place 暗号化し、decrypt した出力を tofu data source に渡す。
sops = "latest"
age = "latest"

"npm:@anthropic-ai/claude-code" = "latest"
"npm:@openai/codex" = "latest"
"npm:@google/gemini-cli" = "latest"

"npm:@antfu/ni" = "latest"

# Browser automation
"npm:playwright" = "latest"


[settings]
experimental = true
# .nvmrcファイルを自動的に読み込む設定
legacy_version_file = true
# ディレクトリ移動時に自動的にツールをインストール
auto_install = true

# pipx バックエンドで uvx を使う設定
pipx.uvx = true

[tasks.chromium-path]
run = "ls ~/.cache/ms-playwright/chromium-*/chrome-linux/chrome | head -1"
description = "Get Playwright Chromium executable path"

[tasks.ziku]
run = "npx ziku@latest"
description = "Run ziku CLI"
